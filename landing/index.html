<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andy's Website</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      color: #e8e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* 背景网格 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99, 102, 241, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, 0.06) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* 光晕 */
    body::after {
      content: "";
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      margin: 0 auto 2rem;
      box-shadow: 0 0 32px rgba(99, 102, 241, 0.4);
      letter-spacing: -1px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #e8e8f0 30%, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.75rem;
    }

    .tagline {
      font-size: 1.1rem;
      color: #8888aa;
      margin-bottom: 3rem;
      letter-spacing: 0.02em;
    }

    .cards {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 3rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 1.25rem 1.75rem;
      min-width: 130px;
      transition: border-color 0.2s, background 0.2s;
      cursor: default;
    }

    .card:hover {
      background: rgba(99, 102, 241, 0.08);
      border-color: rgba(99, 102, 241, 0.3);
    }

    .card-icon {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .card-label {
      font-size: 0.8rem;
      color: #6666aa;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.25rem;
    }

    .card-value {
      font-size: 0.95rem;
      color: #c8c8e0;
      font-weight: 500;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #6366f1, transparent);
      margin: 0 auto 2rem;
      border-radius: 2px;
    }

    .footer {
      position: fixed;
      bottom: 2rem;
      font-size: 0.78rem;
      color: #44445a;
      letter-spacing: 0.04em;
    }

    @media (max-width: 480px) {
      .cards { gap: 0.75rem; }
      .card { min-width: 110px; padding: 1rem 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="avatar">A</div>
    <h1>Andy's Website</h1>
    <p class="tagline">Investor · Builder · Lifelong Learner</p>
    <div class="divider"></div>
    <div class="cards">
      <div class="card">
        <div class="card-icon">📈</div>
        <div class="card-label">Focus</div>
        <div class="card-value">Investing</div>
      </div>
      <div class="card">
        <div class="card-icon">🛠️</div>
        <div class="card-label">Hobby</div>
        <div class="card-value">Building</div>
      </div>
      <div class="card">
        <div class="card-icon">🤖</div>
        <div class="card-label">Stack</div>
        <div class="card-value">AI + Code</div>
      </div>
    </div>
    <p style="color:#55556a; font-size:0.9rem;">This site is private. Nothing to see here.</p>
  </div>
  <div class="footer">© 2026 Andy · All rights reserved</div>
</body>
</html>
