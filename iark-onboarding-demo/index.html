<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>iARK HK 开户 Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: #E8E8E8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
      padding: 20px;
    }
    .phone {
      width: 390px;
      height: 844px;
      background: #fff;
      border-radius: 50px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      flex-shrink: 0;
    }
    .screen {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
      display: none;
      flex-direction: column;
      background: #fff;
      overflow: hidden;
    }
    .screen.active { display: flex; }

    /* Status bar */
    .sb {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }
    .sb-time { font-size: 15px; font-weight: 600; }
    .sb-icons { display: flex; gap: 5px; align-items: center; }

    /* Nav bar */
    .nb {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
    }
    .nb-back { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .nb-right { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

    /* Progress bar */
    .pb { height: 3px; background: #EBEBEB; flex-shrink: 0; }
    .pb-fill { height: 100%; background: linear-gradient(to right, #C84B1A 0%, #E8906A 100%); transition: width 0.4s; }

    /* Scrollable content area */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      -webkit-overflow-scrolling: touch;
    }
    .content::-webkit-scrollbar { display: none; }

    /* Page title */
    .ptitle { font-size: 20px; font-weight: 700; color: #1A1A1A; margin-bottom: 24px; }
    .ptitle-sm { font-size: 18px; font-weight: 700; color: #1A1A1A; margin-bottom: 8px; }

    /* Form field (dropdown style) */
    .ff {
      border: 1px solid #E8E8E8;
      border-radius: 10px;
      padding: 13px 16px;
      margin-bottom: 12px;
      cursor: pointer;
      position: relative;
      background: white;
    }
    .ff:active { background: #FAFAFA; }
    .ff .fl { font-size: 13px; color: #9A9A9A; margin-bottom: 3px; line-height: 1.3; }
    .ff .fv { font-size: 16px; font-weight: 500; color: #1A1A1A; padding-right: 24px; }
    .ff .fp { font-size: 16px; color: #C0C0C0; }
    .ff .fa { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); }
    .ff .fa-up { position: absolute; right: 14px; top: 50%; transform: translateY(-50%) rotate(180deg); }

    /* Text input */
    .fi {
      border: 1px solid #E8E8E8;
      border-radius: 10px;
      padding: 13px 16px;
      margin-bottom: 12px;
      background: white;
    }
    .fi .fl { font-size: 13px; color: #9A9A9A; margin-bottom: 3px; }
    .fi input, .fi textarea {
      width: 100%; border: none; outline: none;
      font-size: 16px; color: #1A1A1A; font-family: inherit;
      background: transparent;
    }
    .fi input::placeholder, .fi textarea::placeholder { color: #C0C0C0; }

    /* Bottom buttons */
    .bbtns {
      padding: 12px 20px 32px;
      display: flex;
      gap: 12px;
      flex-shrink: 0;
      background: white;
    }
    .btn {
      height: 52px; border-radius: 26px; border: none;
      font-size: 17px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: inherit; transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.85; }
    .btn-p { flex: 2; background: #C84B1A; color: white; }
    .btn-p.dis { background: rgba(200,75,26,0.28); cursor: default; pointer-events: none; }
    .btn-s { flex: 1; background: white; color: #C84B1A; border: 1.5px solid #C84B1A; }

    /* Checkbox */
    .cbrow { display: flex; align-items: flex-start; gap: 10px; margin: 8px 0; cursor: pointer; user-select: none; }
    .cb {
      width: 20px; height: 20px; border-radius: 4px;
      border: 1.5px solid #C84B1A; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; margin-top: 1px;
    }
    .cb.on { background: #C84B1A; }
    .cbtext { font-size: 14px; color: #4A4A4A; line-height: 1.5; }

    /* Radio */
    .rdrow { display: flex; align-items: center; gap: 10px; margin: 0 0 4px; cursor: pointer; }
    .rd {
      width: 20px; height: 20px; border-radius: 50%;
      border: 1.5px solid #C0C0C0;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .rd.on { border-color: #C84B1A; }
    .rd.on::after { content: ''; width: 10px; height: 10px; background: #C84B1A; border-radius: 50%; }
    .rdlabel { font-size: 16px; color: #1A1A1A; }

    /* Option card */
    .ocard {
      border: 1.5px solid #E8E8E8; border-radius: 12px;
      padding: 16px; margin-bottom: 12px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; transition: border-color 0.15s;
    }
    .ocard.sel { border-color: #C84B1A; }
    .ocard-l { display: flex; align-items: center; gap: 12px; }
    .ocard-title { font-size: 17px; font-weight: 600; color: #1A1A1A; }
    .ocard-sub { font-size: 13px; color: #9A9A9A; margin-top: 2px; }

    /* Bottom sheet overlay */
    .ov {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.45); z-index: 200;
    }
    .bs {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: white; border-radius: 16px 16px 0 0;
      padding: 0 0 40px; max-height: 75%; overflow-y: auto;
    }
    .bs::-webkit-scrollbar { display: none; }
    .bs-head {
      display: flex; align-items: center; justify-content: center;
      padding: 20px 20px 16px; position: relative;
      font-size: 17px; font-weight: 600; color: #1A1A1A;
    }
    .bs-close {
      position: absolute; right: 20px; top: 20px;
      cursor: pointer; color: #9A9A9A; font-size: 18px; width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
    }
    .bs-item {
      padding: 16px 20px; border-bottom: 1px solid #F2F2F2;
      font-size: 16px; color: #1A1A1A; cursor: pointer;
    }
    .bs-item:active { background: #FAFAFA; }
    .bs-item:last-child { border-bottom: none; }

    /* Search bar */
    .srch-wrap { padding: 0 20px 0; margin-bottom: 4px; }
    .srch {
      width: 100%; height: 40px; background: #F5F5F5;
      border: none; border-radius: 20px;
      padding: 0 16px 0 36px; font-size: 15px;
      outline: none; font-family: inherit;
    }
    .srch-icon { position: absolute; left: 32px; color: #9A9A9A; font-size: 14px; line-height: 40px; }

    /* Country list */
    .sec-title {
      font-size: 13px; color: #9A9A9A;
      background: #F8F8F8; padding: 8px 20px;
    }
    .country-item {
      padding: 14px 20px; border-bottom: 1px solid #F2F2F2;
      display: flex; align-items: center; gap: 12px;
      font-size: 16px; cursor: pointer;
    }
    .country-item:active { background: #FAFAFA; }
    .alpha-bar {
      position: absolute; right: 6px; top: 60px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .alpha-bar span { font-size: 9px; color: #9A9A9A; text-align: center; line-height: 1.4; }
    .alpha-bar .astar { color: #C84B1A; }

    /* Upload */
    .upload-area {
      border: 2px dashed #DDD0C8; border-radius: 12px;
      overflow: hidden; cursor: pointer; margin-bottom: 10px;
    }
    .upload-inner {
      padding: 20px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .upload-card {
      width: 240px; height: 140px;
      background: linear-gradient(135deg, #EEE0D8 0%, #D8C8BE 100%);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .upload-cam {
      background: #C84B1A; width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 22px;
    }
    .upload-lbl { font-size: 13px; color: #888; margin-top: 4px; }
    .upload-sec { display: flex; align-items: center; gap: 5px; font-size: 13px; color: #22AA66; margin-top: 6px; }

    .uploaded-img {
      width: 100%; height: 160px; border-radius: 12px;
      background: linear-gradient(135deg, #909DB8 0%, #6070A0 100%);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .del-btn {
      position: absolute; top: 8px; right: 8px;
      width: 28px; height: 28px; background: rgba(0,0,0,0.5);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; color: white; cursor: pointer; font-size: 13px;
    }

    /* Section header */
    .shdr { font-size: 16px; font-weight: 700; color: #1A1A1A; margin: 16px 0 12px; }
    .shdr-row { display: flex; justify-content: space-between; align-items: center; margin: 16px 0 12px; }

    /* Name grid */
    .ngrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .nfield { border: 1px solid #E8E8E8; border-radius: 10px; padding: 12px 13px; }
    .nfield .fl { font-size: 12px; color: #9A9A9A; margin-bottom: 3px; }
    .nfield .fv { font-size: 16px; font-weight: 500; color: #1A1A1A; }

    /* Info icon */
    .iicon {
      display: inline-flex; width: 16px; height: 16px; border-radius: 50%;
      border: 1.5px solid #9A9A9A; align-items: center; justify-content: center;
      font-size: 10px; color: #9A9A9A; flex-shrink: 0; font-style: italic;
    }

    /* Confirmation rows */
    .csec { margin-bottom: 24px; }
    .csec-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .csec-title { font-size: 17px; font-weight: 700; color: #1A1A1A; }
    .mod-btn {
      font-size: 13px; color: #C84B1A; border: 1px solid #C84B1A;
      padding: 4px 12px; border-radius: 4px; cursor: pointer;
    }
    .inforow { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid #F5F5F5; }
    .inforow:last-child { border-bottom: none; }
    .ik { font-size: 14px; color: #9A9A9A; }
    .iv { font-size: 14px; color: #1A1A1A; font-weight: 500; }

    /* Question */
    .qtext { font-size: 15px; color: #1A1A1A; line-height: 1.6; margin-bottom: 12px; }
    .rdgrp { display: flex; gap: 40px; margin-bottom: 24px; }

    /* Tax */
    .add-tax { border: 1.5px dashed #C84B1A; border-radius: 10px; padding: 16px; text-align: center; color: #C84B1A; font-size: 15px; cursor: pointer; margin-top: 12px; }

    /* Declaration */
    .decl-text { font-size: 14px; color: #4A4A4A; line-height: 1.7; }
    .decl-text p { margin-bottom: 12px; }

    /* Hint */
    .hint { font-size: 12px; color: #9A9A9A; margin: -6px 0 12px; line-height: 1.5; }

    /* OCR error */
    .ocr-err { color: #C84B1A; font-size: 14px; font-weight: 600; margin-bottom: 14px; }

    /* Landing */
    .land-hdr {
      height: 300px;
      background: linear-gradient(180deg, #150600 0%, #2E0D00 50%, #4A1800 100%);
      position: relative;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .land-top-icons { position: absolute; top: 52px; right: 20px; display: flex; gap: 16px; }
    .land-top-icons span { color: #C8A07A; font-size: 14px; cursor: pointer; }
    .iark-logo {
      font-size: 52px; color: #C8A07A;
      font-style: italic; font-weight: 800; letter-spacing: 3px;
      font-family: Georgia, 'Times New Roman', serif;
      text-align: center;
    }
    .city-skyline {
      position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
      opacity: 0.3;
    }
    .land-card {
      flex: 1; background: white; border-radius: 24px 24px 0 0;
      margin-top: -24px; padding: 20px 20px 0; z-index: 1;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .step-row { display: flex; align-items: flex-start; margin-bottom: 24px; padding-top: 4px; }
    .step-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .step-ic {
      width: 48px; height: 44px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .step-ic-on { background: #C84B1A; color: white; }
    .step-ic-off { background: #F2F2F2; color: #9A9A9A; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; }
    .step-dot-on { background: #1A1A1A; }
    .step-dot-off { background: #D0D0D0; }
    .step-lbl { font-size: 12px; }
    .step-lbl-on { color: #1A1A1A; font-weight: 700; }
    .step-lbl-off { color: #9A9A9A; }
    .step-conn { flex: 1; height: 1px; background: #E0E0E0; margin-top: 22px; margin-left: 6px; margin-right: 6px; }
    .land-main-title { text-align: center; font-size: 19px; font-weight: 700; color: #1A1A1A; }
    .land-deco { color: #C84B1A; font-size: 16px; text-align: center; }
    .land-divider { height: 1px; background: linear-gradient(to right, transparent, #C84B1A, transparent); margin: 8px 0 16px; }
    .feat-item { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; font-size: 15px; color: #333; }

    /* Bottom nav */
    .bnav { height: 76px; display: flex; border-top: 1px solid #F0F0F0; flex-shrink: 0; }
    .bni { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; }
    .bni-icon { font-size: 20px; color: #9A9A9A; }
    .bni-lbl { font-size: 11px; color: #9A9A9A; }
    .bni.on .bni-icon { color: #C84B1A; }
    .bni.on .bni-lbl { color: #C84B1A; font-weight: 600; }
    .bnav-center-btn {
      background: #C84B1A; width: 52px; height: 52px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 22px; margin-top: -18px;
    }

    /* Gauge */
    .gauge-wrap { display: flex; flex-direction: column; align-items: center; padding: 36px 0 16px; }

    /* Review card */
    .rev-card {
      background: #FFF5EE; border-radius: 12px;
      padding: 16px; margin: 16px 20px;
    }
    .rev-card-title { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; color: #1A1A1A; margin-bottom: 10px; }
    .rev-card-item { font-size: 14px; color: #4A4A4A; margin-bottom: 5px; }

    /* Pro banner */
    .pro-banner {
      background: #FFF8EE; border-radius: 12px;
      padding: 14px 16px; margin: 8px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .pro-title { display: flex; align-items: center; gap: 6px; font-size: 15px; font-weight: 700; color: #1A1A1A; margin-bottom: 4px; }
    .pro-sub { font-size: 12px; color: #9A9A9A; }
    .pro-btn {
      background: #1A1A1A; color: white; border: none;
      border-radius: 6px; padding: 8px 12px; font-size: 13px;
      cursor: pointer; white-space: nowrap; font-family: inherit;
    }

    /* Signature screen */
    .sig-wrap {
      flex: 1; display: flex; flex-direction: column;
      background: #F2F2F2; overflow: hidden;
    }
    .sig-canvas-area {
      flex: 1; padding: 16px; display: flex;
    }
    #sigCanvas {
      flex: 1; background: white; border-radius: 12px;
      touch-action: none; cursor: crosshair;
    }
    .sig-hint-overlay {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none; color: #CCCCCC; font-size: 15px;
      display: flex; align-items: center; gap: 6px;
      white-space: nowrap;
    }
    .sig-bar {
      background: white; padding: 12px 16px 32px;
      display: flex; align-items: center; gap: 10px;
    }
    .sig-cbtext { flex: 1; font-size: 12px; color: #4A4A4A; line-height: 1.4; }
    .sig-link { color: #C84B1A; }
    .sig-btn-re {
      height: 44px; padding: 0 20px; border-radius: 22px;
      background: white; color: #C84B1A; border: 1.5px solid #C84B1A;
      font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
      flex-shrink: 0; white-space: nowrap;
    }
    .sig-btn-sub {
      height: 44px; padding: 0 20px; border-radius: 22px;
      background: #C84B1A; color: white; border: none;
      font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
      flex-shrink: 0; white-space: nowrap;
    }
    .sig-btn-sub.dis { background: rgba(200,75,26,0.28); pointer-events: none; }

    /* Camera */
    .cam-screen { background: #3A2010; }
    .cam-frame { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
    .cam-guide {
      width: 300px; height: 190px;
      border: 2.5px solid #C84B1A; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .cam-lbl { color: rgba(255,255,255,0.6); font-size: 13px; }
    .cam-bottom { padding: 24px; display: flex; justify-content: center; background: #000; }
    .shutter {
      width: 66px; height: 66px; border-radius: 50%;
      background: rgba(255,255,255,0.9); border: 4px solid #888;
      cursor: pointer;
    }

    /* Activate options — new card layout */
    .act-cards {
      display: flex; gap: 12px; padding: 20px 20px 0; margin-bottom: 4px;
    }
    .act-card {
      flex: 1; border-radius: 14px; padding: 16px 14px 14px;
      display: flex; flex-direction: column; min-height: 130px;
    }
    .act-card-gray { background: #EBEBEB; }
    .act-card-gold { background: #E8D9A0; position: relative; overflow: hidden; }
    .act-card-title { font-size: 15px; font-weight: 700; color: #1A1A1A; line-height: 1.4; margin-bottom: 6px; }
    .act-card-link  { font-size: 13px; color: #B87B10; font-weight: 500; }
    .act-card-note  { font-size: 11px; color: #B0965A; margin-top: auto; text-align: right; }
    .act-in-btn {
      height: 52px; width: calc(100% - 40px); border-radius: 26px;
      background: #C84B1A; color: white; border: none;
      font-size: 17px; font-weight: 600; cursor: pointer; font-family: inherit;
      margin: 20px 20px 0; display: block;
    }
  </style>
</head>
<body>
<div class="phone" id="app"></div>

<script>
// ─── STATE ───────────────────────────────────────────────
const S = {
  screen: 'landing',
  hist: [],
  identity: 'other',
  country: '希腊',
  docType: '希腊永久居留卡',
  photoTaken: false,
  bankFilled: false,
  personalFilled: false,
  addrFilled: false,
  finFilled: false,
  invFilled: false,
  sigDrawn: false,
  sheet: null,   // 'doc' | 'bank-name' | etc
  pfor: null,    // country picker context
};

// ─── NAVIGATION ──────────────────────────────────────────
function go(to, hist = true) {
  if (hist && S.screen !== to) S.hist.push(S.screen);
  S.screen = to;
  render();
}
function back() {
  if (S.hist.length) { S.screen = S.hist.pop(); render(); }
}

// ─── SVG / ICON HELPERS ──────────────────────────────────
const ICO = {
  back: `<svg width="10" height="18" viewBox="0 0 10 18" fill="none"><path d="M9 1L1 9L9 17" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  phones: `<svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M3 18v-6a9 9 0 0 1 18 0v6" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/><rect x="3" y="14" width="4" height="6" rx="2" stroke="#1A1A1A" stroke-width="1.5"/><rect x="17" y="14" width="4" height="6" rx="2" stroke="#1A1A1A" stroke-width="1.5"/></svg>`,
  dn: `<svg width="13" height="8" viewBox="0 0 13 8" fill="none"><path d="M1 1L6.5 7L12 1" stroke="#9A9A9A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  up: `<svg width="13" height="8" viewBox="0 0 13 8" fill="none"><path d="M12 7L6.5 1L1 7" stroke="#9A9A9A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  x: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 1L15 15M15 1L1 15" stroke="#9A9A9A" stroke-width="2" stroke-linecap="round"/></svg>`,
  chk: `<svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  shield: `🛡️`,
  pencil: `✏️`,
};

// ─── REUSABLE COMPONENTS ─────────────────────────────────
function sb(dark) {
  const c = dark ? '#C8A07A' : '#1A1A1A';

function nb(showBack = true, showPh = true) {
  return `<div class="nb">
    ${showBack ? `<div class="nb-back" onclick="back()">${ICO.back}</div>` : `<div style="width:32px"></div>`}
    <div></div>
    ${showPh ? `<div class="nb-right">${ICO.phones}</div>` : `<div style="width:32px"></div>`}
  </div>`;
}

function pb(pct) {
  return `<div class="pb"><div class="pb-fill" style="width:${pct}%"></div></div>`;
}

function bbtns(opts = {}) {
  const hasBack = opts.back !== false;
  const lbl = opts.lbl || '确认并下一步';
  const dis = opts.dis || false;
  const act = opts.act || '';
  return `<div class="bbtns">
    ${hasBack ? `<button class="btn btn-s" onclick="back()">上一步</button>` : ''}
    <button class="btn btn-p ${dis ? 'dis' : ''}" ${dis ? 'disabled' : `onclick="${act}"`}>${lbl}</button>
  </div>`;
}

function cbx(on, lbl, toggle) {
  return `<div class="cbrow" onclick="${toggle}">
    <div class="cb ${on ? 'on' : ''}">${on ? ICO.chk : ''}</div>
    <span class="cbtext">${lbl}</span>
  </div>`;
}

function ff(lbl, val, ph, click, arrowUp = false) {
  return `<div class="ff" onclick="${click}">
    <div class="fl">${lbl}</div>
    ${val ? `<div class="fv">${val}</div>` : `<div class="fp">${ph}</div>`}
    <div class="${arrowUp ? 'fa-up' : 'fa'}">${arrowUp ? ICO.up : ICO.dn}</div>
  </div>`;
}

function fi(lbl, val, ph, extra = '') {
  return `<div class="fi">
    <div class="fl">${lbl}</div>
    <input type="text" value="${val}" placeholder="${ph}" ${extra}/>
  </div>`;
}

// ─── GAUGE CHART ─────────────────────────────────────────
function gauge(pct, lbl) {
  const r = 78, cx = 100, cy = 95;
  function pt(deg) {
    const rad = (deg - 90) * Math.PI / 180;
    return {x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad)};
  }
  const s = pt(180), e = pt(0);
  const fa = 180 * pct / 100;
  const fe = pt(180 - fa);
  return `<svg width="200" height="110" viewBox="0 0 200 110">
    <defs>
      <linearGradient id="gg" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#C84B1A"/>
        <stop offset="100%" stop-color="#E8906A"/>
      </linearGradient>
    </defs>
    <path d="M${s.x},${s.y} A${r},${r} 0 0,1 ${e.x},${e.y}" fill="none" stroke="#EBEBEB" stroke-width="8" stroke-linecap="round"/>
    <path d="M${s.x},${s.y} A${r},${r} 0 0,1 ${fe.x},${fe.y}" fill="none" stroke="url(#gg)" stroke-width="8" stroke-linecap="round"/>
    <circle cx="${fe.x}" cy="${fe.y}" r="5" fill="#C84B1A"/>
    <text x="100" y="90" text-anchor="middle" font-size="36" font-weight="700" fill="#1A1A1A" font-family="-apple-system,sans-serif">${lbl}<tspan font-size="18">%</tspan></text>
  </svg>`;
}

// ─── CANVAS DRAWING ──────────────────────────────────────
let drawing = false, lx = 0, ly = 0, ctx = null;

function initCanvas() {
  const c = document.getElementById('sigCanvas');
  if (!c) return;
  const rect = c.getBoundingClientRect();
  c.width = rect.width * window.devicePixelRatio || rect.width;
  c.height = rect.height * window.devicePixelRatio || rect.height;
  ctx = c.getContext('2d');
  ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
  ctx.strokeStyle = '#1A1A1A';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  c.addEventListener('mousedown', sd);
  c.addEventListener('mousemove', dm);
  c.addEventListener('mouseup', ed);
  c.addEventListener('mouseleave', ed);
  c.addEventListener('touchstart', sd, {passive:false});
  c.addEventListener('touchmove', dm, {passive:false});
  c.addEventListener('touchend', ed);
}

function pos(e, c) {
  const r = c.getBoundingClientRect();
  const scale = 1; // already scaled in initCanvas
  if (e.touches) return {x:(e.touches[0].clientX-r.left)*scale, y:(e.touches[0].clientY-r.top)*scale};
  return {x:(e.clientX-r.left)*scale, y:(e.clientY-r.top)*scale};
}

function sd(e) {
  e.preventDefault();
  const c = document.getElementById('sigCanvas');
  if (!ctx) { ctx = c.getContext('2d'); }
  drawing = true;
  const p = pos(e, c);
  lx = p.x; ly = p.y;
  ctx.beginPath(); ctx.moveTo(lx, ly);
}
function dm(e) {
  e.preventDefault();
  if (!drawing || !ctx) return;
  const c = document.getElementById('sigCanvas');
  const p = pos(e, c);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  ctx.beginPath(); ctx.moveTo(p.x, p.y);
  lx = p.x; ly = p.y;
  if (!S.sigDrawn) {
    S.sigDrawn = true;
    const h = document.getElementById('sigHint');
    if (h) h.style.display = 'none';
  }
}
function ed() { drawing = false; }

function clearSig() {
  const c = document.getElementById('sigCanvas');
  if (c && ctx) ctx.clearRect(0, 0, c.width, c.height);
  S.sigDrawn = false;
  const h = document.getElementById('sigHint');
  if (h) h.style.display = 'flex';
}
